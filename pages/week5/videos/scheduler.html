<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week 5 Scheduler Demo</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.78);
      --line: rgba(148, 163, 184, 0.28);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.24), transparent 28%),
        linear-gradient(180deg, #020617 0%, #0f172a 100%);
    }

    main {
      width: min(1100px, 100%);
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 4vw, 40px);
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.7;
    }

    video {
      display: block;
      width: 100%;
      max-height: 72vh;
      border-radius: 18px;
      background: #000;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1>Week 5 Scheduler Demo</h1>
    <p>Qt 기반 일정관리 앱 시연 영상입니다. 재생이 바로 되지 않으면 아래 링크로 새 탭에서 열어볼 수 있습니다: <a href="./scheduler-demo.mov">영상 직접 열기</a></p>
    <video controls preload="metadata">
      <source src="./scheduler-demo.mov" type="video/quicktime">
      브라우저가 이 영상을 직접 재생하지 못할 수 있습니다. 위 링크로 새 탭에서 열어 주세요.
    </video>
  </main>
</body>
</html>
